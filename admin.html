<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div id="login">
  <h2>Login 🔐</h2>
  <input type="password" id="pass">
  <button id="loginBtn">Login</button>
</div>

<div id="panel" style="display:none;">
  <h2>Admin Panel 🚀</h2>

  <input id="title" Online Earning Ka Asaan Tarika (2026 Guide)="Title"><br>
<input id="desc" Ghar baithe online paise kamane ke best methods="Description"><br>
<input id="img" https://source.unsplash.com/800x400/?money,online="Image URL"><br>

<textarea id="content" Aaj ke digital dor me online earning easy hai...="Content"></textarea><br>

<input id="author" Kazim="Author"><br>

  <button id="saveBtn">Save Blog</button>

  <h3>All Blogs</h3>
  <div id="list"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, addDoc, collection, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBlQP-s0Q-y6J1POkEEHrcDP32Wn6JPK_4",
  authDomain: "kazim-aa621.firebaseapp.com",
  projectId: "kazim-aa621",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// DOM FIX
const pass = document.getElementById("pass");
const loginBtn = document.getElementById("loginBtn");

const panel = document.getElementById("panel");
const list = document.getElementById("list");

const title = document.getElementById("title");
const desc = document.getElementById("desc");
const img = document.getElementById("img");
const content = document.getElementById("content");
const author = document.getElementById("author");

const saveBtn = document.getElementById("saveBtn");

let editId = null;

// 🔐 LOGIN
loginBtn.onclick = function () {
  if (pass.value === "1234") {
    document.getElementById("login").style.display = "none";
    panel.style.display = "block";
    loadBlogs();
  } else {
    alert("Wrong password");
  }
};

// ➕ SAVE / UPDATE
saveBtn.onclick = async function () {
  let blog = {
    title: title.value,
    desc: desc.value,
    img: img.value,
    content: content.value,
    author: author.value,
    date: new Date().toDateString()
  };

  if (!blog.title || !blog.desc) {
    alert("Fill required fields!");
    return;
  }

  if (editId) {
    await updateDoc(doc(db, "blogs", editId), blog);
    editId = null;
  } else {
    await addDoc(collection(db, "blogs"), blog);
  }

  clearForm();
  loadBlogs();
};

// 🧹 CLEAR
function clearForm() {
  title.value = "";
  desc.value = "";
  img.value = "";
  content.value = "";
  author.value = "";
}

// 📥 LOAD BLOGS
async function loadBlogs() {
  list.innerHTML = "";

  const data = await getDocs(collection(db, "blogs"));

  data.forEach((docSnap) => {
    let b = docSnap.data();

    let div = document.createElement("div");

    div.innerHTML = `
      <h4>${b.title}</h4>
      <button class="editBtn">Edit</button>
      <button class="delBtn">Delete</button>
      <hr>
    `;

    // EDIT
    div.querySelector(".editBtn").onclick = () => {
      editId = docSnap.id;
      title.value = b.title;
      desc.value = b.desc;
      img.value = b.img;
      content.value = b.content;
      author.value = b.author;
    };

    // DELETE
    div.querySelector(".delBtn").onclick = async () => {
      await deleteDoc(doc(db, "blogs", docSnap.id));
      loadBlogs();
    };

    list.appendChild(div);
  });
}

</script>

</body>
</html>
