<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div id="login">
  <h2>Login 🔐</h2>
  <input type="password" id="pass" placeholder="Enter Password">
  <button onclick="login()">Login</button>
</div>

<div id="panel" style="display:none;">
  <h2>Admin Panel 🚀</h2>

  <input id="title" placeholder="Title"><br>
  <input id="desc" placeholder="Description"><br>
  <input id="img" placeholder="Image URL"><br>
  <input type="file" id="file"><br>
  <textarea id="content" placeholder="Content"></textarea><br>
  <input id="author" placeholder="Author"><br>

  <button onclick="addBlog()">Save Blog</button>

  <h3>All Blogs</h3>
  <div id="list"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, addDoc, collection, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "PASTE_YOURS",
  authDomain: "PASTE_YOURS",
  projectId: "PASTE_YOURS",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let editId = null;

// 🔐 LOGIN
window.login = function() {
  let pass = document.getElementById("pass").value;
  if (pass === "1234") {
    document.getElementById("login").style.display = "none";
    document.getElementById("panel").style.display = "block";
    loadBlogs();
  } else {
    alert("Wrong password");
  }
};

// 📸 IMAGE UPLOAD (basic)
function getImage() {
  let file = document.getElementById("file").files[0];
  if (file) {
    return URL.createObjectURL(file);
  }
  return document.getElementById("img").value;
}

// ➕ ADD / UPDATE
window.addBlog = async function() {
  let blog = {
    title: title.value,
    desc: desc.value,
    img: getImage(),
    content: content.value,
    author: author.value,
    date: new Date().toDateString()
  };

  if (!blog.title || !blog.desc) {
    alert("Fill required fields!");
    return;
  }

  if (editId) {
    await updateDoc(doc(db, "blogs", editId), blog);
    editId = null;
  } else {
    await addDoc(collection(db, "blogs"), blog);
  }

  clearForm();
  loadBlogs();
};

// 🧹 CLEAR
function clearForm() {
  title.value = desc.value = img.value = content.value = author.value = "";
}

// 📥 LOAD
async function loadBlogs() {
  list.innerHTML = "";
  const data = await getDocs(collection(db, "blogs"));

  data.forEach((docSnap) => {
    let b = docSnap.data();

    list.innerHTML += `
      <div>
        <h4>${b.title}</h4>
        <button onclick="editBlog('${docSnap.id}', '${b.title}', '${b.desc}', '${b.content}', '${b.author}', '${b.img}')">Edit</button>
        <button onclick="deleteBlog('${docSnap.id}')">Delete</button>
      </div>
    `;
  });
}

// ✏️ EDIT
window.editBlog = function(id, t, d, c, a, i) {
  editId = id;
  title.value = t;
  desc.value = d;
  content.value = c;
  author.value = a;
  img.value = i;
};

// ❌ DELETE
window.deleteBlog = async function(id) {
  await deleteDoc(doc(db, "blogs", id));
  loadBlogs();
};
</script>

</body>
</html>
