<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div id="login">
  <h2>Login 🔐</h2>
  <input type="password" id="pass">
  <button id="loginBtn">Login</button>
</div>

<div id="panel" style="display:none;">
  <h2>Admin Panel 🚀</h2>

  <input id="title" placeholder="Title">
<input id="desc" placeholder="Description">
<input id="img" placeholder="Image URL">
<textarea id="content" placeholder="Content"></textarea>
<input id="author" placeholder="Author">

  <button id="saveBtn">Save Blog</button>

  <h3>All Blogs</h3>
  <div id="list"></div>
</div>


  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  addDoc,
  collection,
  getDocs,
  deleteDoc,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBlQP-s0Q-y6J1POkEEHrcDP32Wn6JPK_4",
  authDomain: "kazim-aa621.firebaseapp.com",
  projectId: "kazim-aa621",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// FIX DOM SAFETY
const $ = (id) => document.getElementById(id);

const pass = $("pass");
const loginBtn = $("loginBtn");
const panel = $("panel");
const list = $("list");

const title = $("title");
const desc = $("desc");
const img = $("img");
const content = $("content");
const author = $("author");

let editId = null;

// LOGIN
loginBtn.onclick = () => {
  if (pass.value === "1234") {
    $("login").style.display = "none";
    panel.style.display = "block";
    loadBlogs();
  } else {
    alert("Wrong password");
  }
};

// SAVE
$("saveBtn").onclick = async () => {
  let blog = {
    title: title.value,
    desc: desc.value,
    img: img.value,
    content: content.value,
    author: author.value,
    date: new Date().toDateString()
  };

  if (!blog.title || !blog.desc) {
    alert("Title + Desc required");
    return;
  }

  if (editId) {
    await updateDoc(doc(db, "blogs", editId), blog);
    editId = null;
  } else {
    await addDoc(collection(db, "blogs"), blog);
  }

  clearForm();
  loadBlogs();
};

// LOAD
async function loadBlogs() {
  list.innerHTML = "";

  const data = await getDocs(collection(db, "blogs"));

  data.forEach((d) => {
    let b = d.data();

    let div = document.createElement("div");

    div.innerHTML = `
      <h4>${b.title}</h4>
      <button class="edit">Edit</button>
      <button class="del">Delete</button>
      <hr>
    `;

    div.querySelector(".edit").onclick = () => {
      editId = d.id;
      title.value = b.title;
      desc.value = b.desc;
      img.value = b.img;
      content.value = b.content;
      author.value = b.author;
    };

    div.querySelector(".del").onclick = async () => {
      await deleteDoc(doc(db, "blogs", d.id));
      loadBlogs();
    };

    list.appendChild(div);
  });
}

// CLEAR
function clearForm() {
  title.value = "";
  desc.value = "";
  img.value = "";
  content.value = "";
  author.value = "";
}
</script>
