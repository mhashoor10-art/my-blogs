<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<div id="login">
  <h2>Login 🔐</h2>
  <input type="password" id="pass">
  <button id="loginBtn">Login</button>
</div>

<div id="panel" style="display:none;">
  <h2>Admin Panel 🚀</h2>

  <input id="title" placeholder="Title">
  <input id="desc" placeholder="Description">
  <input id="img" placeholder="Image URL">
  <textarea id="content" placeholder="Content"></textarea>
  <input id="author" placeholder="Author">

  <button id="saveBtn">Save Blog</button>

  <h3>All Blogs</h3>
  <div id="list"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  addDoc,
  collection,
  getDocs,
  deleteDoc,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBlQP-s0Q-y6J1POkEEHrcDP32Wn6JPK_4",
  authDomain: "kazim-aa621.firebaseapp.com",
  projectId: "kazim-aa621",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const $ = (id) => document.getElementById(id);

let editId = null;

$("loginBtn").onclick = () => {
  if ($("pass").value === "1234") {
    $("login").style.display = "none";
    $("panel").style.display = "block";
    loadBlogs();
  } else {
    alert("Wrong password");
  }
};

$("saveBtn").onclick = async () => {
  const blog = {
    title: $("title").value,
    desc: $("desc").value,
    img: $("img").value,
    content: $("content").value,
    author: $("author").value,
    date: new Date().toDateString()
  };

  if (!blog.title || !blog.desc) return alert("Fill required fields");

  if (editId) {
    await updateDoc(doc(db, "blogs", editId), blog);
    editId = null;
  } else {
    await addDoc(collection(db, "blogs"), blog);
  }

  clear();
  loadBlogs();
};

async function loadBlogs() {
  const list = $("list");
  list.innerHTML = "";

  const data = await getDocs(collection(db, "blogs"));

  data.forEach((d) => {
    const b = d.data();

    const div = document.createElement("div");
     
    div.innerHTML = `
  <div style="display:flex; align-items:center; gap:10px;">

    <img src="${b.img || 'https://via.placeholder.com/80'}" 
         style="width:60px; height:60px; object-fit:cover; border-radius:6px;">

    <div style="flex:1;">
      <h4 style="margin:0;">${b.title}</h4>
    </div>

    <button class="edit">Edit</button>
    <button class="del">Delete</button>

  </div>
  <hr>
`;

    div.querySelector(".edit").onclick = () => {
      editId = d.id;
      $("title").value = b.title;
      $("desc").value = b.desc;
      $("img").value = b.img;
      $("content").value = b.content;
      $("author").value = b.author;
    };

    div.querySelector(".del").onclick = async () => {

  const confirmDelete = confirm("⚠️ Are you sure you want to delete this blog?");

  if (!confirmDelete) return; // agar cancel kiya to kuch nahi hoga

  await deleteDoc(doc(db, "blogs", d.id));

  alert("✅ Blog deleted successfully");

  loadBlogs();
};
    

    list.appendChild(div);
  });
}

function clear() {
  $("title").value = "";
  $("desc").value = "";
  $("img").value = "";
  $("content").value = "";
  $("author").value = "";
}
</script>

</body>
</html>
