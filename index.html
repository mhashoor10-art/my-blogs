async function loadBlogs() {

  const data = await getDocs(q);

  data.forEach((doc) => {

    html += `
      <div class="card">
        <h3>${b.title || "No Title"}</h3>
        <img loading="lazy" src="${b.image || "https://via.placeholder.com/300"}">

      </div>
    `;
  });

}

window.onscroll = function () {
