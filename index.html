<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <!-- SEO -->

<link rel="stylesheet" href="style.css">

<title>Kazim Blog</title>

<style>
body { font-family: Arial; padding: 20px; }
.dark { background: #111; color: white; }
.card { border: 1px solid #ccc; padding: 10px; margin: 10px 0; }
img { width: 100%; }
</style>
</head>

<body>

<button id="darkBtn">🌙 Dark Mode</button>
<input id="search" placeholder="Search...">

<h2>Blogs</h2>
<div id="blogs"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBlQP-s0Q-y6J1POkEEHrcDP32Wn6JPK_4",
  authDomain: "kazim-aa621.firebaseapp.com",
  projectId: "kazim-aa621",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// DOM FIX
const blogsDiv = document.getElementById("blogs");
const searchInput = document.getElementById("search");
const darkBtn = document.getElementById("darkBtn");

let allBlogs = [];

// LOAD DATA
async function loadBlogs() {
  const data = await getDocs(collection(db, "blogs"));

  allBlogs = [];

  data.forEach((docSnap) => {
    let b = docSnap.data();
    b.id = docSnap.id;
    allBlogs.push(b);
  });

  showBlogs(allBlogs);
}

// SHOW BLOGS
function showBlogs(list) {
  blogsDiv.innerHTML = "";

  list.forEach(b => {
    blogsDiv.innerHTML += `
      <div class="card">
        <h3>${b.title}</h3>
        <img src="${b.img}">
        <p>${b.desc}</p>
        <a href="post.html?id=${b.id}">Read More</a>
      </div>
    `;
  });
}

// SEARCH FIX
searchInput.addEventListener("input", () => {
  let q = searchInput.value.toLowerCase();

  let filtered = allBlogs.filter(b =>
    b.title.toLowerCase().includes(q)
  );

  showBlogs(filtered);
});

// DARK MODE FIX
darkBtn.addEventListener("click", () => {
  document.body.classList.toggle("dark");
  localStorage.setItem("dark", document.body.classList.contains("dark"));
});

// LOAD DARK MODE
if (localStorage.getItem("dark") === "true") {
  document.body.classList.add("dark");
}

// INIT
loadBlogs();

</script>

</body>
</html>
