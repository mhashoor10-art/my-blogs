<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <!-- SEO -->
  <meta name="description" content="Best blog website for tech tips, online earning and tutorials">
  <meta name="keywords" content="blog, tech, earning, tips, tutorials">
  <meta name="author" content="Kazim">
<meta name="google-site-verification" content="hbqEwgtUnMeSxn1KEhRA5B1kOg2VYHIHXixzDodGeY0" />
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://mhashoor10-art.github.io/kazim/">
  <title>Kazim Blog | Tech Tips & Online Earning 🚀</title>

  <style>
    :root {
      --bg: #f4f4f4;
      --text: #111;
      --card: #fff;
      --nav: #222;
    }

    body.dark {
      --bg: #111;
      --text: #fff;
      --card: #1e1e1e;
      --nav: #000;
    }
   html {
  scroll-behavior: smooth;
   }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: 0.3s;
    }

    /* NAV */
    nav {
      background: var(--nav);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      flex-wrap: wrap;
    }

    nav h2 {
      color: white;
      margin: 0;
    }

    nav a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      color: yellow;
    }

    .toggle {
  background: #fff;
  color: #000;
  border: none;
  padding: 6px 10px;
  cursor: pointer;
  border-radius: 5px;
}

body.dark .toggle {
  background: #333;
  color: #fff;
}

    /* SECTIONS */
    section {
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
    }

    .card {
      background: var(--card);
      padding: 15px;
      margin: 15px 0;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.02);
    }

    .card a {
      text-decoration: none;
      color: var(--text);
    }

    /* CONTACT */
    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #222;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #444;
    }

    /* MOBILE */
    @media (max-width: 600px) {
      nav {
        flex-direction: column;
        text-align: center;
      }
    }

  </style>
  
</head>

<body>

<!-- NAV -->
<nav>
  <h2>My Pro Blog 🚀</h2>

  <div>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </div>

  <button class="toggle" onclick="toggleDark()">Dark Mode</button>
</nav>

<!-- HOME -->
<section id="home">
  <div class="container">
    <h2>Latest Blogs</h2>

    <div class="card">
      <a href="blog1.html">
        <h3>My First Blog</h3>
        <p>Click to read post</p>
      </a>
    </div>

    <div class="card">
      <a href="blog2.html">
        <h3>My Second Blog</h3>
        <p>Click to read post</p>
      </a>
    </div>

  </div>
</section>

<!-- ABOUT -->
<section id="about">
  <div class="container card">
    <h2>About Me</h2>
    <p>
      Welcome to my pro blog 🚀  
      Here I share tech tips, blogging guides, and online earning tricks.
    </p>
  </div>
</section>

<!-- CONTACT -->
<section id="contact">
  <div class="container card">
    <h2>Contact Me</h2>

    <form onsubmit="alert('Message sent!'); return false;">
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Your Email" required>
      <textarea name="message" rows="5" placeholder="Your Message"></textarea>
      <button type="submit">Send Message</button>
    </form>
  </div>
</section>
  
<script src="script.js"></script>
  
</body>
</html>
