<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  <div id="post">
  <div class="loader">
    <div class="spinner"></div>
    <p>Loading blog...</p>
  </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBlQP-s0Q-y6J1POkEEHrcDP32Wn6JPK_4",
  authDomain: "kazim-aa621.firebaseapp.com",
  projectId: "kazim-aa621",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const post = document.getElementById("post");
const id = new URLSearchParams(location.search).get("id");

/* START LOADER */
post.innerHTML = `<div class="loader"><p>Loading blog...</p></div>`;

let allBlogs = [];

/* LOAD BLOG */
async function loadPost() {
  try {

    if (!id) {
      post.innerHTML = "<h2>No blog ID found</h2>";
      return;
    }

    const snap = await getDoc(doc(db, "blogs", id));

    if (!snap.exists()) {
      post.innerHTML = "<h2>Blog not found</h2>";
      return;
    }

    const b = snap.data();

    /* IMPORTANT: FULL CLEAN RENDER */
    post.innerHTML = `
      <div class="card">
        <img class="post-img" src="${b.img || ''}">

        <h1>${b.title || 'No Title'}</h1>

        <p><b>${b.author || 'Admin'}</b> | ${b.date || ''}</p>

        <hr>

        <div style="white-space: pre-line;">
          ${b.content || 'No content available'}
        </div>
      </div>
    `;

    await loadRelated();

  } catch (err) {
    console.log(err);
    post.innerHTML = "<h2>Error loading blog</h2>";
  }
}

/* RELATED BLOGS (SAFE VERSION) */
async function loadRelated() {
  const snap = await getDocs(collection(db, "blogs"));

  allBlogs = [];

  snap.forEach(d => {
    if (d.id !== id) {
      allBlogs.push({ id: d.id, ...d.data() });
    }
  });

  allBlogs = allBlogs.slice(0, 3);

  let html = `<h2 style="margin-top:30px;">Related Blogs</h2>`;

  allBlogs.forEach(b => {
    html += `
      <div class="card">
        <a href="post.html?id=${b.id}">
          <img src="${b.img || ''}">
          <h3>${b.title || ''}</h3>
          <p>${b.desc || ''}</p>
        </a>
      </div>
    `;
  });

  post.innerHTML += html;
}

loadPost();
