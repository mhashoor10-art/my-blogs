<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  <div id="post">
  <div class="loader">
    <div class="spinner"></div>
    <p>Loading blog...</p>
  </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBlQP-s0Q-y6J1POkEEHrcDP32Wn6JPK_4",
  authDomain: "kazim-aa621.firebaseapp.com",
  projectId: "kazim-aa621",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const id = new URLSearchParams(window.location.search).get("id");
const post = document.getElementById("post");

async function loadPost() {
  post.style.opacity = 0;
  if (!id) return post.innerHTML = "No post found";

  const snap = await getDoc(doc(db, "blogs", id));

  if (!snap.exists()) return post.innerHTML = "Not found";

  const b = snap.data();

  post.innerHTML = `
  <div class="card">
    <img class="post-img" src="${b.img || "https://via.placeholder.com/600"}">
    <h1>${b.title}</h1>
    <p><b>By:</b> ${b.author || "Admin"}</p>
    <small>${b.date || ""}</small>
    <hr>
    <p>${b.content || ""}</p>
  </div>
`;
  setTimeout(() => {
  post.style.opacity = 1;
  post.style.transition = "0.5s";
}, 100);
}

loadPost();
</script>
<script>
window.addEventListener("scroll", () => {
  const img = document.querySelector(".post-img");
  if (!img) return;

  let scroll = window.scrollY;

  let scale = 1 - scroll / 1000;
  if (scale < 0.6) scale = 0.6;

  img.style.transform = `scale(${scale})`;
});
</script>
</body>
</html>
