<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog Post</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  <div id="post">Loading...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBlQP-s0Q-y6J1POkEEHrcDP32Wn6JPK_4",
  authDomain: "kazim-aa621.firebaseapp.com",
  projectId: "kazim-aa621",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const id = new URLSearchParams(window.location.search).get("id");
const postDiv = document.getElementById("post");

async function loadPost() {
  if (!id) {
    postDiv.innerHTML = "No post found";
    return;
  }

  const snap = await getDoc(doc(db, "blogs", id));

  if (!snap.exists()) {
    postDiv.innerHTML = "Post not found";
    return;
  }

  const b = snap.data();

  postDiv.innerHTML = `
    <div class="card">
      <img src="${b.img}">
      <h1>${b.title}</h1>
      <p>${b.content || b.desc || ""}</p>
      <small>${b.date || ""}</small>
    </div>
  `;
}

loadPost();
</script>

</body>
</html>
