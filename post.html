<!DOCTYPE html>
<html>
<head>
  <title>Blog Post</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Vercel Web Analytics -->
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</head>

<body>

<h2 id="title">Loading...</h2>
<img id="img" style="width:100%; max-width:500px;">
<p id="desc"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBlQP-s0Q-y6J1POkEEHrcDP32Wn6JPK_4",
  authDomain: "kazim-aa621.firebaseapp.com",
  projectId: "kazim-aa621",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// GET ID FROM URL
const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get("id");

async function loadPost() {
  const docRef = doc(db, "blogs", id);
  const docSnap = await getDoc(docRef);

  if (docSnap.exists()) {
    let data = docSnap.data();

    document.getElementById("title").innerText = data.title;
    document.getElementById("img").src = data.img;
    document.getElementById("desc").innerText = data.desc;
  } else {
    document.getElementById("title").innerText = "Post not found!";
  }
}

loadPost();
</script>

</body>
</html>
