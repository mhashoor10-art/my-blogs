<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  <div id="post">
  <div class="loader">
    <div class="spinner"></div>
    <p>Loading blog...</p>
  </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBlQP-s0Q-y6J1POkEEHrcDP32Wn6JPK_4",
  authDomain: "kazim-aa621.firebaseapp.com",
  projectId: "kazim-aa621",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const id = new URLSearchParams(location.search).get("id");
const post = document.getElementById("post");

let allBlogs = [];

async function loadPost() {

  const snap = await getDoc(doc(db, "blogs", id));

  if (!snap.exists()) {
    post.innerHTML = "Not found";
    return;
  }

  const b = snap.data();

  post.innerHTML = `
    <div class="card">
      <img class="post-img" src="${b.img}">
      <h1>${b.title}</h1>
      <p><b>${b.author}</b> | ${b.date}</p>
      <hr>
      <p>${b.content}</p>
    </div>
  `;

  loadRelated(b.title);
}

/* RELATED BLOGS */
async function loadRelated(currentTitle) {
  const snap = await getDocs(collection(db, "blogs"));

  allBlogs = [];

  snap.forEach(doc => {
    if (doc.id !== id) {
      allBlogs.push({ id: doc.id, ...doc.data() });
    }
  });

  let related = allBlogs.slice(0, 3);

  post.innerHTML += `
    <h2 style="margin-top:30px;">Related Blogs</h2>
  `;

  related.forEach(b => {
    post.innerHTML += `
      <div class="card">
        <a href="post.html?id=${b.id}">
          <img src="${b.img}">
          <h4>${b.title}</h4>
          <p>${b.desc}</p>
        </a>
      </div>
    `;
  });
}

loadPost();
